name: Refresh Student Feed Snapshot

# Rebuild and redeploy hosting on a schedule so the static
# /student-feed-snapshot.json never goes weeks stale between code pushes
# (a stale copy flashes bulletins that were deleted or expired since the
# last deploy). No untrusted event data is used in any run step.

on:
  schedule:
    # Daily at 09:00 UTC (early morning US Eastern).
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # prebuild regenerates public/student-feed-snapshot.json from Firestore
      # (falls back to the client SDK when no admin credentials are present).
      - name: Build with fresh snapshot
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ebhcs-bulletin-board
